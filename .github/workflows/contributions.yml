name: contribution graph

on:
  schedule:
    - cron: "17 3 * * *"   # daily, 03:17 UTC
  workflow_dispatch:        # manual run button
  push:
    branches: [main]
    paths:
      - ".github/scripts/render_contributions.py"
      - ".github/workflows/contributions.yml"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render brand-styled contribution heatmap
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          # GITHUB_TOKEN reads the public contribution calendar via GraphQL.
          # If the graph ever renders empty, swap in a PAT with read:user:
          #   GITHUB_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUT: assets/contributions.svg
        run: python .github/scripts/render_contributions.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain assets/contributions.svg)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/contributions.svg
            git commit -m "chore: refresh contribution graph"
            git push
          else
            echo "no change"
          fi
